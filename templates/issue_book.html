{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white">
                <h4 class="mb-0">Issue Book</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">Borrower Name</label>
                        <input type="text" name="borrower_name" class="form-control" required />
                        <div class="form-text">Use the same name as an active reservation to complete that reservation while issuing.</div>
                    </div>
                    <div class="alert alert-info py-2">
                        Borrowing period is 14 days. Late returns are fined Rs. 5 per day after the due date.
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Select Book</label>
                        <select name="book_id" class="form-select" required>
                            <option value="">Choose book...</option>
                            {% for book in books %}
                            <option value="{{ book.id }}">
                                {{ book.title }} by {{ book.author }} (Available: {{ book.available_quantity }})
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-primary" type="submit">Issue Book</button>
                        <a href="{{ url_for('issued_books') }}" class="btn btn-outline-secondary">View Issued List</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
